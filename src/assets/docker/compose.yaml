name: slidewsl

networks:
  fpm:
  keydb:
  mysql:

volumes:
  keydb:

services:

  # --------------------------------------------------------------------------------

  devcontainer:
    container_name: devcontainer
    build:
      context: devcontainer
      args:
        - USER=${USER}
      additional_contexts:
        shared: _shared
    hostname: devcontainer
    network_mode: host
    env_file:
      - .env
      - path: .env.devcontainer
        required: false
    stdin_open: true
    tty: true
    volumes:
      - /docker:/docker:ro
      - /etc/localtime:/etc/localtime:ro
    profiles:
      - devcontainer

  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------

  angular_node_modules:
    build:
      context: angular
      target: node_base
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    environment:
      ANGULAR_ROOT: /angular
    volumes:
      - ${SLIDEWSL_ANGULAR_ROOT_IN_WSL}:/angular
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - path: .env.angular_dev_server
        required: false
    deploy:
      replicas: 0
    profiles:
      - angular_node_modules

  angular_create_starter:
    extends:
      service: angular_node_modules
    build:
      target: starter
    profiles:
      - angular_create_starter

  angular_app_build:
    extends:
      service: angular_node_modules
    build:
      target: app_build
    profiles:
      - angular_app_build

  angular_dev_server:
    container_name: angular_dev_server
    extends:
      service: angular_node_modules
    build:
      target: dev_server
    environment:
      APPS: ${APPS:-unknown}
    ports:
      - "0.0.0.0:4300-4310:4300-4310"
    deploy:
      replicas: 1
    depends_on:
      - nginx
    profiles:
      - angular_dev_server

  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------

  nginx:
    container_name: nginx
    build:
      context: nginx
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    ports:
      - "0.0.0.0:4200-4210:4200-4210"
      - "0.0.0.0:80:8080"
    networks:
      - default
      - fpm
    volumes:
      - /docker/nginx/templates:/etc/nginx/templates:ro
      - ${SLIDEWSL_ANGULAR_ROOT_IN_WSL}:/angular
      - ${SLIDEWSL_LARAVEL_ROOT_IN_WSL}:/laravel
      - ${SLIDEWSL_WEB_ROOT_IN_WSL}:/webroot
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - path: .env.nginx
        required: false
    depends_on:
      - php-fpm

  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------

  php-composer:
    build:
      context: php-fpm
      target: base
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    volumes:
      - ${SLIDEWSL_WEB_ROOT_IN_WSL}:/webroot
      - ${SLIDEWSL_LARAVEL_ROOT_IN_WSL}:/laravel
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - path: .env.php-fpm
        required: false
    deploy:
      replicas: 0

  laravel_create_starter:
    extends:
      service: php-composer
    build:
      target: starter
    profiles:
      - laravel_create_starter

  php-fpm:
    container_name: php-fpm
    extends:
      service: php-composer
    build:
      target: fpm
    networks:
      - fpm
      - keydb
      - mysql
    environment:
      WSL2_GATEWAY: ${WSL2_GATEWAY}
    deploy:
      replicas: 1
    depends_on:
      - keydb-node1
      - mysql

  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------

  keydb-node1:
    container_name: keydb-node1
    hostname: keydb-node1
    build:
      context: keydb
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    networks:
      - keydb
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - keydb:/data
      - ./keydb/keydb-node1:/etc/keydb
    env_file:
      - path: .env.keydb
        required: false

  keydb-node2:
    container_name: keydb-node2
    hostname: keydb-node2
    extends:
      service: keydb-node1
    volumes:
      - ./keydb/keydb-node2:/etc/keydb

  keydb-node3:
    container_name: keydb-node3
    hostname: keydb-node3
    extends:
      service: keydb-node1
    volumes:
      - ./keydb/keydb-node3:/etc/keydb

  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------

  mysql:
    container_name: mysql
    build:
      context: mysql
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - mysql
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./mysql/conf/docker.cnf:/etc/my.cnf
      - ${SLIDEWSL_DB_ROOT_IN_WSL}:/var/lib/mysql
    env_file:
      - path: .env.mysql
        required: false

  phpmyadmin:
    container_name: phpmyadmin
    build:
      context: phpmyadmin
      additional_contexts:
        shared: _shared
    user: "${WSL_UID}:${WSL_GID}"
    environment:
      - PMA_HOST=mysql
    networks:
      - mysql
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./phpmyadmin/conf.d:/etc/phpmyadmin/conf.d
    ports:
      - 0.0.0.0:8080:80
    env_file:
      - path: .env.phpmyadmin
        required: false

  # --------------------------------------------------------------------------------
